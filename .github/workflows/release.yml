name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (${{ matrix.os }})
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            container: debian:12
          - os: centos
            container: almalinux:8
          - os: arch
            container: archlinux:base

    steps:
      - name: Install System Dependencies (Debian)
        if: matrix.os == 'debian'
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y gcc-multilib g++-multilib cmake make git binutils wget

      - name: Install System Dependencies (CentOS)
        if: matrix.os == 'centos'
        run: |
          dnf -y install epel-release dnf-plugins-core
          /usr/bin/crb enable || dnf config-manager --set-enabled powertools || true
          dnf -y install gcc gcc-c++ make cmake git glibc-devel.i686 libstdc++-devel.i686 libstdc++-static.i686 libstdc++-static binutils wget
          
          for d in /usr/include/c++/*; do
            if [ -d "$d" ]; then
              for lib32 in "$d"/i*86-redhat-linux*; do
                if [ -d "$lib32/bits" ]; then
                  mkdir -p "$d/x86_64-redhat-linux/32"
                  cp -r "$lib32/bits" "$d/x86_64-redhat-linux/32/"
                fi
              done
            fi
          done

      - name: Install System Dependencies (Arch)
        if: matrix.os == 'arch'
        run: |
          echo "[multilib]" >> /etc/pacman.conf
          echo "Include = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm gcc-multilib lib32-glibc lib32-gcc-libs cmake make git binutils wget

      - name: Build and Install Static Argon2 (x86)
        run: |
          git clone https://github.com/P-H-C/phc-winner-argon2.git /tmp/argon2
          cd /tmp/argon2
          make OPTTARGET=none CC="gcc -m32 -fPIC"

          mkdir -p /usr/include /usr/lib /usr/lib32 /usr/lib/i386-linux-gnu
          cp include/argon2.h /usr/include/
          cp libargon2.a /usr/lib/
          cp libargon2.a /usr/lib32/
          cp libargon2.a /usr/lib/i386-linux-gnu/
          
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Workaround GCC 8 C++17 bug (CentOS)
        if: matrix.os == 'centos'
        run: |
          find . -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" -o -name "*.c" \) -exec sed -i 's/\[\[maybe_unused\]\]//g' {} +

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_C_FLAGS="-m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_CXX_FLAGS="-std=c++17 -m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32 -Wl,--build-id=none -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --config Release -j $(nproc)

      - name: Strip and Rename Binary
        run: |
          strip --strip-all build/omp-argon2.so
          mv build/omp-argon2.so build/omp-argon2-${{ matrix.os }}.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-${{ matrix.os }}
          path: build/omp-argon2-${{ matrix.os }}.so

  build-windows:
    name: Build Windows (x86)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Argon2 via vcpkg
        run: vcpkg install argon2:x86-windows-static-md

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake .. -A Win32 `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DCMAKE_CXX_STANDARD=17 `
            -DVCPKG_TARGET_TRIPLET=x86-windows-static-md `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS="/Brepro /EHsc" `
            -DCMAKE_CXX_FLAGS="/Brepro /EHsc"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-windows
          path: build/Release/omp-argon2.dll

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
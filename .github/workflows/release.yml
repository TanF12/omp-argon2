name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (x86)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib libargon2-dev:i386 binutils

      - name: Configure CMake (Deterministic & Anonymous)
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_CXX_FLAGS="-m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32 -Wl,--build-id=none"

      - name: Build
        run: cmake --build build --config Release -j $(nproc)

      - name: Strip Binary (Remove Debug Symbols)
        run: |
          strip --strip-all build/omp-argon2.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-linux
          path: build/omp-argon2.so

  build-windows:
    name: Build Windows (x86)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Argon2 via vcpkg
        run: vcpkg install argon2:x86-windows

      - name: Configure CMake (Deterministic & Anonymous)
        run: |
          mkdir build && cd build
          cmake .. -A Win32 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS="/Brepro" `
            -DCMAKE_CXX_FLAGS="/Brepro"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-windows
          path: build/Release/omp-argon2.dll

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/omp-argon2.so
            artifacts/omp-argon2.dll
          generate_release_notes: true
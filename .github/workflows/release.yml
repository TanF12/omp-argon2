name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (${{ matrix.os }})
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            container: debian:12
            setup: |
              dpkg --add-architecture i386
              apt-get update
              apt-get install -y gcc-multilib g++-multilib cmake make git binutils wget
          - os: centos
            container: almalinux:8
            setup: |
              dnf -y install epel-release
              dnf -y install gcc gcc-c++ make cmake git glibc-devel.i686 libstdc++-devel.i686 binutils wget
          - os: arch
            container: archlinux:base
            setup: |
              echo "[multilib]" >> /etc/pacman.conf
              echo "Include = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Su --noconfirm gcc-multilib cmake make git binutils wget

    steps:
      - name: Install System Dependencies
        run: ${{ matrix.setup }}

      - name: Build and Install Static Argon2 (x86)
        run: |
          git clone https://github.com/P-H-C/phc-winner-argon2.git /tmp/argon2
          cd /tmp/argon2
          make OPTTARGET=none CC="gcc -m32" PREFIX=/usr
          make install PREFIX=/usr
          rm -f /usr/lib/libargon2.so* /usr/lib*/libargon2.so* /usr/lib/*/*/libargon2.so* || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_CXX_FLAGS="-m32 -fmacro-prefix-map=${{ github.workspace }}=. -ffile-prefix-map=${{ github.workspace }}=. -Wno-builtin-macro-redefined -U__DATE__ -U__TIME__" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32 -Wl,--build-id=none -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --config Release -j $(nproc)

      - name: Strip and Rename Binary
        run: |
          strip --strip-all build/omp-argon2.so
          mv build/omp-argon2.so build/omp-argon2-${{ matrix.os }}.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-${{ matrix.os }}
          path: build/omp-argon2-${{ matrix.os }}.so

  build-windows:
    name: Build Windows (x86)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Argon2 via vcpkg
        run: vcpkg install argon2:x86-windows

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake .. -A Win32 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_FLAGS="/Brepro /EHsc" `
            -DCMAKE_CXX_FLAGS="/Brepro /EHsc"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: samp-argon2-windows
          path: build/Release/omp-argon2.dll

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true